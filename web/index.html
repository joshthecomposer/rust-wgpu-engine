<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>learn-wgpu-rs</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #12141c;
      color: #d8dbe8;
      font-family: system-ui, sans-serif;
    }

    #shell {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
    }

    #game-canvas {
      width: min(100vw, 177.7778vh);
      height: min(56.25vw, 100vh);
      background: #12141c;
      outline: none;
    }

    #status {
      position: fixed;
      left: 1rem;
      bottom: 1rem;
      padding: 0.5rem 0.75rem;
      border-radius: 0.375rem;
      background: rgb(0 0 0 / 60%);
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <main id="shell">
    <canvas id="game-canvas" width="1280" height="720" tabindex="0"></canvas>
  </main>
  <div id="status">Loading WebGPU...</div>

  <!-- Wasm assets: preload via dist/asset-manifest.json (generated by scripts/build_web.ps1).
       Includes config/*.json (e.g. emitter_data.json), resources/shaders/** (e.g. particles_es300.glsl), resources/textures/**. -->

  <script type="module">
    import init from "./learn_wgpu_rs.js";

    const status = document.getElementById("status");

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = src;
        s.async = false;
        s.onload = () => resolve();
        s.onerror = () => reject(new Error(`script failed: ${src}`));
        document.head.appendChild(s);
      });
    }

    async function loadFmodBridgeScripts() {
      try {
        await loadScript("third_party/fmod/fmodstudio.js");
      } catch {
        console.info(
          "[learn-wgpu-rs] third_party/fmod/fmodstudio.js missing — web FMOD disabled (see docs/fmod_web_setup.md)"
        );
      }
      await loadScript("game_fmod_bridge.js");
    }

    async function preloadAssets() {
      const assets = {};
      const manifestResponse = await fetch("asset-manifest.json");
      if (!manifestResponse.ok) {
        throw new Error(`Failed to load asset manifest: ${manifestResponse.status}`);
      }
      const assetManifest = await manifestResponse.json();

      // Hundreds of parallel fetches exhausts the browser (net::ERR_INSUFFICIENT_RESOURCES).
      const concurrency = 8;
      let next = 0;
      async function worker() {
        while (true) {
          const i = next++;
          if (i >= assetManifest.length) return;
          const path = assetManifest[i];
          const response = await fetch(path);
          if (!response.ok) {
            throw new Error(`Failed to load asset ${path}: ${response.status}`);
          }
          assets[path] = new Uint8Array(await response.arrayBuffer());
        }
      }
      await Promise.all(Array.from({ length: concurrency }, () => worker()));

      window.__learn_wgpu_rs_assets = assets;
    }

    try {
      status.textContent = "Loading audio bridge...";
      await loadFmodBridgeScripts();
      status.textContent = "Loading assets...";
      await preloadAssets();
      status.textContent = "Loading WebGPU...";
      await init();
      status.textContent = "WebGPU web game boot ready";
      document.getElementById("game-canvas").focus();
    } catch (error) {
      console.error(error);
      status.textContent = `Failed to start: ${error?.message ?? error}`;
    }
  </script>
</body>
</html>

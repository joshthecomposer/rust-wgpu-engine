name: Deploy to itch.io

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown

      - name: Install cargo-web
        run: cargo install cargo-web --locked

      - name: Build web release
        run: cargo web deploy --release

      - name: Create zip from deployed web build
        run: |
          cd target/deploy
          zip -r ../../dist.zip .

      - name: Save zip as GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: itch-build
          path: dist.zip

      - name: Setup butler
        uses: remarkablegames/setup-butler@v3

      - name: Upload to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          butler push dist.zip terminatormunky/fight-the-guys-demo:web
